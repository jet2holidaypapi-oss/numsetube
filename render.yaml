services:
  - type: web
    name: viewtube
    env: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true
      - key: DATA_DIR
        value: /var/data
    disk:
      name: viewtube-data
      mountPath: /var/data
      sizeGB: 10
